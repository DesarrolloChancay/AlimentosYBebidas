server {
    listen 80;
    listen [::]:80;
    server_name ayb.clubcastillodechancay.com;

    client_max_body_size 25M;
    large_client_header_buffers 4 32k;

    access_log /var/log/nginx/ayb_access.log;
    error_log /var/log/nginx/ayb_error.log;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; connect-src 'self' ws: wss:" always;

    location ^~ /static/evidencias/ {
        return 404;
    }

    location ^~ /static/evidencias_reglamento/ {
        return 404;
    }

    location ^~ /static/img/firmas/ {
        return 404;
    }

    location ^~ /static/firmas/ {
        return 404;
    }

    location /static/ {
        alias /home/ubuntu/AlimentosYBebidas/app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5060/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5060;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
