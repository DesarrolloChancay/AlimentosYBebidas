server {
    listen 80;
    listen [::]:80;
    server_name ayb.clubcastillodechancay.com;

    client_max_body_size 25M;

    access_log /var/log/nginx/ayb_access.log;
    error_log /var/log/nginx/ayb_error.log;

    location /static/ {
        alias /home/ubuntu/AlimentosYBebidas/app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5060/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:5060;
        proxy_http_version 1.1;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
